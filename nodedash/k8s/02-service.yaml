# ClusterIP Service — the Ingress will route to this.
# Because it's a DaemonSet, the Service load-balances across all 4 node pods.

apiVersion: v1
kind: Service
metadata:
  name: nodedash
  namespace: nodedash
  labels:
    app: nodedash
spec:
  selector:
    app: nodedash
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 3000
  type: ClusterIP
